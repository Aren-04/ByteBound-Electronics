<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ByteBound Electronics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-blue: #2563eb; --bg-slate: #f1f5f9; }
        body { 
            background-color: var(--bg-slate); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .reset-card { 
            width: 100%; 
            max-width: 400px; 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
        }
        .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 20px;
        }
        .form-control { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .form-control:focus { box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); border-color: var(--primary-blue); }
        .btn-primary { padding: 12px; border-radius: 10px; font-weight: 600; background-color: var(--primary-blue); }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="card reset-card p-4 p-md-5">
        <div class="text-center">
            <div class="icon-box">
                <i class="bi bi-key-fill"></i>
            </div>
            <h3 class="fw-bold text-dark">Forgot Password?</h3>
            <p class="text-muted small mb-4">No worries, it happens. Enter your email and we'll send you recovery instructions.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} border-0 small py-2 mb-4" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="email" name="email" class="form-control border-start-0" placeholder="name@company.com" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                Send Reset Link
            </button>
            
            <div class="text-center">
                <a href="{{ url_for('login') }}" class="text-decoration-none small text-muted fw-medium">
                    <i class="bi bi-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
